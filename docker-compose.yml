services:
  app:
    build: .
    ports:
      - '3000:3000'
    env_file:
      - .env.local
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    env_file:
      - .env.local
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
